amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.6
    alpha2: 0.6
    alpha3: 0.8
    alpha4: 0.8
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: scan
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    tf_broadcast: true
    min_particles: 1500
    max_particles: 5000
    z_hit: 0.9
    z_short: 0.02
    z_max: 0.03
    z_rand: 0.05
    sigma_hit: 0.12
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 8.0
    laser_min_range: 0.12
    laser_model_type: "likelihood_field"
    transform_tolerance: 0.5
    max_beams: 180
    update_min_d: 0.03
    update_min_a: 0.03
    
bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 1000
    navigators:
    - navigate_to_pose
    - navigate_through_poses
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 15.0
    odom_topic: /odometry/filtered
    odom_duration: 0.3
    costmap_update_timeout: 1.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.3
    progress_checker_plugins:
    - progress_checker
    goal_checker_plugins:
    - general_goal_checker
    controller_plugins:
    - FollowPath

    # Check progress
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.03
      movement_time_allowance: 40.0

    # Goal Tolerance (Arrived?)
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.35

    # Controller: Pure Pursuit, reliable for Diff Drive
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      ########## [  LINEAR NAVIGATION CONTROLLER PARAMETERS ] ##########
      # FOR LINEAR VELOCITY <=== 
      desired_linear_vel: 0.20 # linear velocity when following the path
      max_vel_x: 0.30 
      min_vel_x: 0.15
      max_vel_theta: 1.0
      min_speed_theta: 0.25
      acc_lim_x: 0.6
      decel_lim_x: -0.6
      acc_lim_theta: 1.5
      decel_lim_theta: -1.5

      lookahead_dist: 0.4
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.6
      lookahead_time: 1.5
      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: false # to make lookahead distance scale with velocity 
      min_approach_linear_velocity: 0.08 # minimum velocity when close to the goal
      approach_velocity_scaling_dist: 0.5 # define when to start slowing down as we approach the goal (in meters)
      use_collision_detection: true # for safety (detect if we are about to collide and stop) 
      max_allowed_time_to_collision_up_to_carrot: 1.5 # Time required for collision checker
      # FOR HARD CARVES AND CONTROL LINEAR-ANGULAR VELOCITY <===
      use_regulated_linear_velocity_scaling: true # to slowing down on sharp curves
      use_cost_regulated_linear_velocity_scaling: false # to slowing down when closer to obstacles
      cost_scaling_dist: 0.25
      cost_scaling_gain: 0.7
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.12
      max_robot_pose_search_dist: 10.0
      use_interpolation: true
      ########## [ ROTATE TO HEADING CONTROLLER PARAMETERS ] ##########
      use_rotate_to_heading: true 
      rotate_to_heading_min_angle: 0.15 # This value to define when to switch to rotation mode (in radians)
      # FOR ANGULAR VELOCITY TO FACING GOALS <===
      rotate_to_heading_angular_vel: 1.8 # rotation velocity when in rotate to heading mode
      max_angular_accel: 3.0 # Acceleration limits for rotation controller


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      robot_radius: 0.21 # 20cm Radius
      transform_tolerance: 0.5
      
      plugins:
      - voxel_layer
      - range_layer
      - inflation_layer

      # LiDAR Layer
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: False
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.5
          obstacle_min_range: 0.25

      # Ultrasonic Layer (Range Sensors)
      range_layer:
        plugin: "nav2_costmap_2d::RangeSensorLayer"
        enabled: True
        topics:
        - "/ultrasound/sensor_1"
        - "/ultrasound/sensor_2"
        - "/ultrasound/sensor_3"
        phi: 0.35
        inflate_cone: 0.15
        no_readings_timeout: 0.0
        clear_threshold: 0.2
        mark_threshold: 0.85
        clear_on_max_reading: true
        input_sensor_type: "VARIABLE"

      # Safety Padding
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.22
        inflate_unknown: false
        inflate_around_unknown: false
      # always_send_full_costmap: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 3.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.21
      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 0.5
      
      plugins:
      - static_layer
      - obstacle_layer
      - inflation_layer

      # LiDAR Obstacles
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.5
          obstacle_min_range: 0.25

      # The Saved Map
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      # Safety Padding
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 9.0
        inflation_radius: 0.25
        inflate_unknown: false
        inflate_around_unknown: false
      always_send_full_costmap: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "hospital_map.yaml"

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins:
    - GridBased

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.25
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 1.5
      cost_travel_multiplier: 4.0
      use_final_approach_orientation: false

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
    - spin
    - backup
    - wait
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200


velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"

    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    velocity_timeout: 1.0

    
    # SPEED LIMITS (Allow fast rotation)
    # Linear X, Y, Angular Z (2.5 rad/s is fast)
    max_velocity:
    - 0.25
    - 0.0
    - 0.5
    min_velocity: 
    - -0.25
    - 0.0
    - -0.5
    
    # ACCELERATION (The "Snappy" Factor)
    # High numbers here = Fast reaction time.
    # Low numbers = Sluggish ramp up.
    max_accel: # <--- High Angular Accel to overcome friction
    - 0.45
    - 0.0
    - 0.5
    min_accel:  # Stops quickly
    - -0.3
    - 0.0
    - -0.5

    max_decel:
    - -0.45
    - 0.0
    - -0.9
    
    # Deadband (Let the motor node handle the minimums)
    deadband_velocity: 
    - 0.07
    - 0.0
    - 0.08